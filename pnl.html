// ==================== HELPERS ====================
var fmt = function(n) { return '¥' + Math.round(n).toLocaleString('zh-CN'); };

// Split data: first 4 rows = income items, rest = expense items (skip summary rows at end)
// 收入：比特安套餐 + 美团套餐（毛收入）
var incomeItems = [RAW[0], RAW[2]];  // 比特安套餐收益, 美团套餐收益
// 费用：推广费 + 运营费用（共12项，推广费已从收入减项改为费用）
var expenseItems = [RAW[1]].concat(RAW.slice(4, 15));  // 比特安推广费 + 11项费用

// 两平台实收 = 比特安套餐 + 美团套餐（毛收入，推广费已归入费用侧）
var netIncome = MONTHS.map(function(m, i) {
    return incomeItems[0].monthly[i].value + incomeItems[1].monthly[i].value;
});
var totalExpense = MONTHS.map(function(m, i) {
    return expenseItems.reduce(function(s, item) { return s + item.monthly[i].value; }, 0);
});
var profit = MONTHS.map(function(m, i) { return netIncome[i] - totalExpense[i]; });

var totalNetIncome = netIncome.reduce(function(a, b) { return a + b; }, 0);
var totalExp = totalExpense.reduce(function(a, b) { return a + b; }, 0);
var totalProfit = totalNetIncome - totalExp;
var profitRate = totalNetIncome > 0 ? (totalProfit / totalNetIncome * 100) : 0;

// 5大费用子类别累计
var sumItem = function(idx) { return RAW[idx].monthly.reduce(function(s, m) { return s + m.value; }, 0); };
var expPromotion = sumItem(1);   // 比特安推广费
var expCabinetRent = sumItem(4); // 付总部电柜租金
var expBatteryRent = sumItem(5); // 付总部电池租金

// ==================== USER & ASSET DATA ====================
var userData = RAW[17];   // 付费用户数量/个
var cabinetData = RAW[18]; // 电柜/台
var batteryData = RAW[19]; // 电池/颗
var efficiencyData = RAW[20]; // 柜效
var batteryRatioData = RAW[21]; // 电池比

// Extract values from monthly data (use MONTHS to match array length)
var getArr = function(item) {
    return item.monthly.map(function(m) { var v = m.value; return (v === null || v === undefined || isNaN(v) || v === 0) ? null : v; });
};

var userVals = getArr(userData);
var cabinetVals = getArr(cabinetData);
var batteryVals = getArr(batteryData);
var efficiencyVals = getArr(efficiencyData);
var batteryRatioVals = getArr(batteryRatioData);

// Latest actual values (last non-null)
var lastNV = function(arr) { var f = arr.filter(function(v){return v !== null;}); return f.length > 0 ? f[f.length-1] : 0; };
var latestUsers = lastNV(userVals);
var latestCabinet = lastNV(cabinetVals);
var latestBattery = lastNV(batteryVals);
var latestEfficiency = lastNV(efficiencyVals);
var latestBatteryRatio = lastNV(batteryRatioVals);

// KPI Row 3: 用户及资产
(function() {
    var kpis3 = [
        { label: '👥 当前付费用户', value: fmts(latestUsers) + ' 人', sub: '最新月份数据', cls: 'b-cyan' },
        { label: '🔌 当前电柜数', value: fmts(latestCabinet) + ' 台', sub: '最新月份数据', cls: 'b-blue' },
        { label: '🔋 当前电池数', value: fmts(latestBattery) + ' 颗', sub: '最新月份数据', cls: 'b-purple' },
        { label: '📊 当前柜效', value: latestEfficiency.toFixed(1) + ' 人/柜', sub: '付费用户 / 电柜数', cls: 'b-green' },
        { label: '⚖️ 当前电池比', value: latestBatteryRatio.toFixed(2), sub: '电池颗数 / 用户数', cls: 'b-gold' },
        { label: '📈 峰值用户数', value: fmts(Math.max.apply(null, activeUV)) + ' 人', sub: '历史最高', cls: 'b-pink' },
    ];
    document.getElementById('kpiCards3').innerHTML = kpis3.map(function(k) {
        return '<div class="kpi-card ' + k.cls + '"><div class="label">' + k.label + '</div><div class="value">' + k.value + '</div><div class="sub">' + k.sub + '</div></div>';
    }).join('');
})();

// Build active series (filter nulls from each)
var activeUM = []; var activeUV = [];
var activeCM = []; var activeCV = [];
var activeBM = []; var activeBV = [];
var activeEM = []; var activeEV = [];
var activeRM = []; var activeRV = [];
MONTHS.forEach(function(m, i) {
    if (userVals[i] !== null) { activeUM.push(m); activeUV.push(userVals[i]); }
    if (cabinetVals[i] !== null) { activeCM.push(m); activeCV.push(cabinetVals[i]); }
    if (batteryVals[i] !== null) { activeBM.push(m); activeBV.push(batteryVals[i]); }
    if (efficiencyVals[i] !== null) { activeEM.push(m); activeEV.push(efficiencyVals[i]); }
    if (batteryRatioVals[i] !== null) { activeRM.push(m); activeRV.push(batteryRatioVals[i]); }
});
